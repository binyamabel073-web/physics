name: Build Mass Animator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Set up Gradle tools
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Step 4: Generate the missing Gradle wrapper inside the mass-animator folder
      - name: Generate missing Gradle Wrapper
        run: |
          cd mass-animator
          gradle wrapper
          chmod +x gradlew

      # Step 5: Forge a temporary debug keystore for signing the APK
      - name: Generate Debug Keystore
        run: |
          cd mass-animator
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      # Step 6: Build the debug APK
      - name: Build with Gradle
        run: |
          cd mass-animator
          ./gradlew assembleDebug --stacktrace

      # Step 7: Upload the finished APK so you can download it
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mass-animator-apk
          path: mass-animator/app/build/outputs/apk/debug/app-debug.apk
